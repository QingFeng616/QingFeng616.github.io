<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>

  <!-- Docsify 核心样式（使用稳定版 v4） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

  <!-- 自定义样式 -->
  <style>
    .sidebar {
      background-color: #f8f8f8;
    }
    .content {
      padding-top: 60px;
    }
  </style>
</head>

<body>
  <!-- Docsify 挂载点 -->
  <div id="app">加载中...</div>

  <!-- Docsify 配置 -->
  <script>
    window.$docsify = {
      // 网站名称（显示在左上角）
      name: '我的网站',

      // 点击名称跳转到首页
      nameLink: '/',

      // 仓库地址（显示右上角 GitHub 角标）
      repo: 'QingFeng616/QingFeng616.github.io',

      // 加载侧边栏
      loadSidebar: true,

      // 加载顶部导航栏
      loadNavbar: true,

      // 封面页
      coverpage: true,

      // 最大标题级别显示在侧边栏
      subMaxLevel: 3,

      // 滚动到顶部
      auto2top: true,

      // 全文搜索配置
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '没有找到结果!',
        depth: 6
      },

      // 复制代码按钮
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制!'
      }
    };
  </script>

  <!-- Docsify 核心库（稳定版 v4） -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/plugins/search.min.js"></script>

  <!-- 复制代码插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
